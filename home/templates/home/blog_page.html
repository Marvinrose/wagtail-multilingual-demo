{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<div style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    <h1>{{ page.title }}</h1>
    <p style="color: #666;">{{ page.date }}</p>
    <p><em>{{ page.intro }}</em></p>
    <div>{{ page.body|richtext }}</div>
    <p><a href="{{ page.get_parent.url }}">← Back to blog</a></p>
</div>
{% endblock %}
